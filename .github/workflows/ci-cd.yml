name: CI/CD Pipeline — Skill Tracker

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE: tauseef0007/skill-tracker
  FRONTEND_IMAGE: tauseef0007/skill-tracker-frontend

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Dependencies download
        working-directory: backend
        run: go mod download

      - name: Build check
        working-directory: backend
        run: go build ./...

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: DockerHub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Backend image build & push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Frontend image build & push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: VM pe SSH karke deploy karo
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/skill_test_project
            docker pull tauseef0007/skill-tracker:latest
            docker pull tauseef0007/skill-tracker-frontend:latest
            docker compose down
            docker compose up -d
            sleep 5
            curl -f http://localhost/health && echo "✅ Deploy successful!" || echo "❌ Deploy failed!"